name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: sql-lsp

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: sql-lsp
            cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: sql-lsp

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: sql-lsp

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: sql-lsp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release -p sql-lsp --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release -p sql-lsp --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          DST="sql-lsp-${{ matrix.target }}"
          cp "$SRC" "$DST"
          echo "artifact=$DST" >> "$GITHUB_OUTPUT"
        id: rename

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: sql-lsp-${{ matrix.target }}

  # Build and attach the WASM extension blob
  wasm:
    name: Build WASM extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build WASM
        run: cargo build --release --target wasm32-wasip1

      - name: Package extension
        run: |
          mkdir -p dist
          cp target/wasm32-wasip1/release/zed_sql_tools.wasm dist/
          cp extension.toml dist/
          tar -czf zed-sql-tools-extension.tar.gz -C dist .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: zed-sql-tools-extension.tar.gz
